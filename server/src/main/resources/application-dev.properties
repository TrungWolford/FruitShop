# ============================================================
# PROFILE: dev  —  Chạy LOCAL (không cần Railway / env vars)
# Kích hoạt bằng: --spring.profiles.active=dev
# Hoặc thêm vào VM options: -Dspring.profiles.active=dev
# ============================================================

spring.application.name=FruitShop

# ============================
# DATABASE — PostgreSQL LOCAL
# ============================
# Đổi host/port/dbname/user/password theo máy của bạn
spring.datasource.url=jdbc:postgresql://localhost:5434/FruitShop?sslmode=disable
spring.datasource.username=admin
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Tắt SSL khi chạy local
spring.datasource.hikari.data-source-properties.sslmode=disable

# ============================
# HIBERNATE / JPA
# ============================
# update  = tự tạo/sửa bảng theo entity (an toàn cho dev)
# create  = xóa & tạo lại toàn bộ mỗi lần start (dùng khi cần reset)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HikariCP — pool nhỏ cho dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# ============================
# SERVER
# ============================
server.address=0.0.0.0
server.port=8080

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================
# JSON & LOCALE
# ============================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.locale=vi_VN
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================
# LOGGING — verbose khi dev
# ============================
logging.level.root=INFO
logging.level.server.FruitShop=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================
# FILE UPLOAD
# ============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

