# ⚠️ QUAN TRỌNG: IPN callback cho local development
# Phải dùng ngrok để expose localhost ra internet
# Cách sử dụng:
# 1. Cài ngrok: https://ngrok.com/download
# 2. Chạy: ngrok http 8080
# 3. Copy HTTPS URL (ví dụ: https://abc123.ngrok-free.app)
# 4. Thay thế URL dưới đây với ngrok URL của bạn
# 5. Restart backend để áp dụng URL mới
momo.ipn-url=http://localhost:8080/api/momo/ipn-handler
# Khi dùng ngrok: momo.ipn-url=https://YOUR-NGROK-URL.ngrok-free.app/api/momo/ipn-handler

# ============================
# SPRING BOOT ACTUATOR
# ============================
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.endpoint.env.show-values=ALWAYS

# ============================
# SPRING DEVTOOLS (Auto-reload)
# ============================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/java

# ============================
# CORS (Development - Allow localhost)
# ============================
# Cho phép frontend local (React Vite) gọi API
# Frontend mặc định chạy trên http://localhost:5173
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5174
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ============================
# ERROR HANDLING (Dev - Show details)
# ============================
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# ============================
# H2 CONSOLE (Optional - nếu muốn dùng H2 cho testing)
# ============================
# Uncomment nếu muốn dùng H2 in-memory database cho testing nhanh
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# ============================
# CACHE (Disable cho development)
# ============================
spring.cache.type=none
spring.thymeleaf.cache=false

# ============================
