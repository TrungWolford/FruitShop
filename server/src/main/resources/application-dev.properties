# ============================
# APPLICATION DEV PROFILE
# ============================
# Kích hoạt profile: mvn spring-boot:run -Dspring-boot.run.profiles=dev
# Hoặc trong IDE: Set Active Profile = dev
# KHÔNG ĐƯỢC đặt spring.profiles.active trong file profile-specific này!
# ============================

spring.application.name=FruitShop-DEV

# ============================
# DATABASE (PostgreSQL Local)
# ============================
# Sử dụng PostgreSQL local cho development
spring.datasource.url=jdbc:postgresql://localhost:5434/FruitShop
spring.datasource.username=admin
spring.datasource.password=123

# PostgreSQL Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Không cần SSL cho local development
spring.datasource.hikari.data-source-properties.sslmode=disable

# ============================
# HIBERNATE / JPA (Development)
# ============================
# update: tự động cập nhật schema khi entity thay đổi
spring.jpa.hibernate.ddl-auto=update

# Hiển thị SQL queries trong console (để debug)
spring.jpa.show-sql=true

# Format SQL cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true

# PostgreSQL Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================
# HIKARI CONNECTION POOL (Dev)
# ============================
# Giảm pool size cho local development
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# ============================
# SERVER CONFIGURATION (Local)
# ============================
# Chạy trên localhost:8080
server.address=localhost
server.port=8080

# Encoding UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ============================
# JSON & LOCALE
# ============================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.locale=vi_VN
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# ============================
# LOGGING (Development - Verbose)
# ============================
# Root logging level
logging.level.root=INFO

# Spring framework
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# Hibernate SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.type.descriptor.sql=TRACE

# JPA
logging.level.org.springframework.data.jpa=DEBUG

# Your application package
logging.level.server.FruitShop=DEBUG

# Console output pattern (colorful for development)
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx

# ============================
# FILE UPLOAD
# ============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

