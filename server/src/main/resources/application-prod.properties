# ============================================================
# PROFILE: prod  —  Deploy Render / Railway
# Kích hoạt bằng env var: SPRING_PROFILES_ACTIVE=prod
# ============================================================

# ============================
# CORS
# ============================
# Set env var CORS_ORIGINS trên Render với value là URL frontend của bạn
# Nhiều URL thì cách nhau bằng dấu phẩy, KHÔNG có khoảng trắng
cors.origins=${CORS_ORIGINS:https://fruitshop-c4.vercel.app}

# ============================
# DATABASE — PostgreSQL (env vars)
# ============================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${DB_SSL_MODE:require}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# ============================
# HIBERNATE / JPA
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HikariCP Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

# ============================
# SERVER
# ============================
server.address=0.0.0.0
server.port=${PORT:8080}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ============================
# JSON & LOCALE
# ============================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.locale=vi_VN
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================
# LOGGING — tắt verbose khi prod
# ============================
logging.level.root=WARN
logging.level.server.FruitShop=INFO
logging.level.org.hibernate.SQL=WARN

# ============================
# FILE UPLOAD
# ============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ============================
# CLOUDINARY
# ============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.secure=true

# ============================
# MOMO
# ============================
momo.partner-code=${MOMO_PARTNER_CODE}
momo.access-key=${MOMO_ACCESS_KEY}
momo.secret-key=${MOMO_SECRET_KEY}
momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api}
momo.request-type=payWithATM
momo.return-url=${MOMO_RETURN_URL}
momo.ipn-url=${MOMO_IPN_URL}

# ============================
# GEMINI AI
# ============================
gemini.api-key=${GEMINI_API_KEY}
gemini.model=gemini-2.0-flash
gemini.max-output-tokens=1024
gemini.temperature=0.7

# ============================
# ACTUATOR
# ============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=true
