spring.application.name=FruitShop

# ============================
# DATABASE (PostgreSQL Railway)
# ============================

# JDBC URL t? bi?n môi tr??ng Railway
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=${DB_SSL_MODE:require}

# Username & Password t? Railway
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# PostgreSQL Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Railway often enforces SSL; allow override via DB_SSL_MODE (e.g., disable)
spring.datasource.hikari.data-source-properties.sslmode=${DB_SSL_MODE:require}

# ============================
# HIBERNATE / JPA
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HikariCP Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'


# ============================
# SERVER CONFIGURATION
# ============================
# Railway s? truy?n PORT qua env ? b?t bu?c důng PORT env
server.address=0.0.0.0
server.port=${PORT:8080}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true


# ============================
# JSON & LOCALE
# ============================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.locale=vi_VN
spring.jackson.date-format=dd/MM/yyyy HH:mm:ss
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false


# ============================
# LOGGING
# ============================
logging.level.org.springframework.data.jpa=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE 


# ============================
# FILE UPLOAD
# ============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB


# ============================
# CLOUDINARY
