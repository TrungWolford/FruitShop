[build]
  builder = "nixpacks"
  buildCommand = "cd server && chmod +x mvnw && ./mvnw clean package -DskipTests"

[deploy]
  startCommand = "cd server && java -Dserver.port=$PORT -jar target/FruitShop-0.0.1-SNAPSHOT.jar"
  healthcheckPath = "/actuator/health"
  healthcheckTimeout = 100
  restartPolicyType = "always"

[env]
  PGTZ = "UTC"