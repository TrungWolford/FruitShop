name: Frontend CI/CD

permissions:
  contents: read
  issues: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'client/**'
      - '.github/workflows/feCI.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'client/**'

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run linter
        run: pnpm lint
        continue-on-error: true

      - name: Run tests
        run: pnpm test:ci
        continue-on-error: true

      - name: Build frontend
        run: pnpm build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: client/dist/

      - name: Create Issue on Test/Build Failure
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = '🔴 Frontend CI Failed - Tests or Build Error';
            const body = `## Frontend CI Pipeline Failed
            
            **Workflow:** ${context.workflow}
            **Job:** test-frontend
            **Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Branch:** ${context.ref}
            **Commit:** ${context.sha.substring(0, 7)}
            **Triggered by:** @${context.actor}
            
            ### Details
            - **Build/Test Status:** ❌ Failed
            - **Time:** ${new Date().toISOString()}
            
            ### Possible Issues
            - Linting errors
            - Test failures
            - Build compilation errors
            - Dependencies issues
            
            ### Next Steps
            1. Check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Review the coverage artifact
            3. Fix the failing tests or build issues
            4. Run \`pnpm lint\` and \`pnpm test\` locally
            5. Push the fix to trigger a new CI run
            
            ---
            *This issue was automatically created by GitHub Actions*`;
            
            // Check for existing open issues with same title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['ci-failure', 'frontend'],
              per_page: 10
            });
            
            const existingIssue = issues.data.find(issue => issue.title === title);
            
            if (existingIssue) {
              // Update existing issue instead of creating new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### 🔄 CI Failed Again\n\n${body}`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci-failure', 'frontend', 'bug']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

  deploy-vercel:
    name: Deploy to Vercel
    needs: test-frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Create Issue on Deploy Failure
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = '🚨 Frontend Deploy Failed - Vercel Deployment Error';
            const body = `## Frontend Deployment to Vercel Failed
            
            **Workflow:** ${context.workflow}
            **Job:** deploy-vercel
            **Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Branch:** ${context.ref}
            **Commit:** ${context.sha.substring(0, 7)}
            **Triggered by:** @${context.actor}
            
            ### Details
            - **Deployment Status:** ❌ Failed
            - **Platform:** Vercel
            - **Time:** ${new Date().toISOString()}
            
            ### Possible Causes
            - Vercel project configuration issues
            - Invalid VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID
            - Build errors during Vercel deployment
            - Environment variables not set
            - Vercel resource limits exceeded
            
            ### Next Steps
            1. Check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            2. Verify Vercel secrets in repository settings
            3. Check Vercel dashboard for deployment logs
            4. Ensure all environment variables are configured
            5. Try deploying manually with \`vercel --prod\`
            
            ---
            *This issue was automatically created by GitHub Actions*`;
            
            // Check for existing open issues with same title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['deploy-failure', 'frontend', 'vercel'],
              per_page: 10
            });
            
            const existingIssue = issues.data.find(issue => issue.title === title);
            
            if (existingIssue) {
              // Update existing issue instead of creating new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `### 🔄 Deployment Failed Again\n\n${body}`
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deploy-failure', 'frontend', 'vercel', 'critical']
              });
              console.log(`Created new issue #${issue.data.number}`);
            }

      - name: Close Issue on Successful Deploy
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Find and close related issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['deploy-failure', 'frontend'],
              per_page: 10
            });
            
            for (const issue of issues.data) {
              if (issue.title.includes('Frontend Deploy Failed')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ **Deployment Successful!**\n\nThe frontend has been successfully deployed to Vercel.\n\n**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n**Commit:** ${context.sha.substring(0, 7)}\n\nClosing this issue.`
                });
                
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                
                console.log(`Closed issue #${issue.number}`);
              }
            }
